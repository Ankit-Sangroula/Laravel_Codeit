<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeIT Header</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Google Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>
  <body>
    <header>
      <nav class="main-nav">
        <!-- Logo -->
        <a href="#" class="logo">
          <img src="./assets/logo.png" alt="Company Logo" />
        </a>

        <!-- Center Navigation -->
        <ul class="nav-links">
          <li>
            <a href="#enquiry">
              <span class="material-symbols-outlined">support_agent</span>
              Enquiry
            </a>
          </li>
          <li>
            <a href="#technical-support">
              <span class="material-symbols-outlined">call</span>
              Technical Support
            </a>
          </li>
          <li>
            <a href="#community">
              <span class="material-symbols-outlined">groups</span>
              Community
            </a>
          </li>
        </ul>

        <!-- Right Section -->
        <div class="right-section">
          <!-- Search -->
          <form action="/search" method="get" role="search">
            <input
              type="search"
              name="q"
              class="search"
              placeholder="Search courses..."
            />
          </form>

          <!-- Dashboard Button -->
          <a href="#" class="dashboard-btn">
            <span class="material-symbols-outlined">person</span>
            Dashboard
          </a>
        </div>
      </nav>
      <nav class="second-nav">
        <ul class="secondnav-links">
          <li>
            <a href="#home">Home</a>
          </li>

          <li>
            <a href="#allcourses">All Courses</a>
          </li>
          <li>
            <a href="#upcomingclasses" class="upcoming-class">
              <span class="material-symbols-outlined">watch</span>
              Upcoming Classes
            </a>
          </li>
          <li>
            <a href="#testimonials">Testimonials</a>
          </li>

          <li><a href="#menotrs">Mentors</a></li>

          <li><a href="#recordedvideo">Recorded Videos</a></li>

          <li><a href="#contactus">Contact Us</a></li>
        </ul>
      </nav>
    </header>
  </body>
</html>
